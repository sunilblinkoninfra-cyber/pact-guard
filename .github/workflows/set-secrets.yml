name: ⚙️ Configure Secrets & Final Setup

on:
  workflow_dispatch:

jobs:
  setup:
    name: Set Repository Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyNaCl
        run: pip install PyNaCl --quiet

      - name: Configure GIST_TOKEN and INDEX_GIST_ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, base64, urllib.request

          TOKEN = os.environ['GH_TOKEN']
          REPO  = os.environ['REPO']

          def api(method, path, payload=None):
              url = f'https://api.github.com{path}'
              data = json.dumps(payload).encode() if payload else None
              req = urllib.request.Request(url, data=data, method=method, headers={
                  'Authorization': f'token {TOKEN}',
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
                  'User-Agent': 'pact-sentinel',
              })
              resp = urllib.request.urlopen(req, timeout=20)
              body = resp.read()
              return resp.status, json.loads(body) if body else {}

          # 1. Get repo public key for secret encryption
          status, pk = api('GET', f'/repos/{REPO}/actions/secrets/public-key')
          print(f'Public key fetch: HTTP {status}')
          if status != 200:
              print('ERROR:', pk); exit(1)

          from nacl import encoding, public as nacl_public

          def encrypt(key_b64, value):
              pk_obj = nacl_public.PublicKey(key_b64.encode(), encoding.Base64Encoder())
              box = nacl_public.SealedBox(pk_obj)
              return base64.b64encode(box.encrypt(value.encode())).decode()

          # 2. Create the analysis-index Gist
          status, gist = api('POST', '/gists', {
              'description': 'Pact Sentinel — analysis result index',
              'public': False,
              'files': {'index.json': {'content': '{}'}}
          })
          if status == 201:
              index_id = gist['id']
              print(f'Index gist created: {index_id}')
          else:
              print(f'Gist creation: HTTP {status}')
              index_id = ''

          # 3. Set secrets
          secrets = {
              'GIST_TOKEN':    TOKEN,
              'INDEX_GIST_ID': index_id,
          }
          for name, value in secrets.items():
              if not value:
                  print(f'Skipping {name} (empty)'); continue
              enc = encrypt(pk['key'], value)
              s, r = api('PUT', f'/repos/{REPO}/actions/secrets/{name}', {
                  'encrypted_value': enc, 'key_id': pk['key_id']
              })
              print(f'{"✅" if s in (201,204) else "❌"} Secret {name}: HTTP {s}')

          print()
          print('Done! GIST_TOKEN and INDEX_GIST_ID are now set.')
          print()
          print('One manual step remaining:')
          print('  Add OPENAI_API_KEY at:')
          print(f'  https://github.com/{REPO}/settings/secrets/actions')
          PYEOF
